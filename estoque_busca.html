<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Estoque · Busca</title>
<style>
  :root{
    --bg:#14171a;
    --panel:#1c2024;
    --panel-alt:#242a2f;
    --accent:#ffc233;
    --accent-dim:#8c6a1e;
    --text:#eceef0;
    --text-muted:#8f969c;
    --border:#33393e;
    --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); overscroll-behavior:none;}
  body{display:flex; flex-direction:column; height:100vh; height:100dvh;}

  header{
    flex:0 0 auto;
    background:var(--panel);
    border-bottom:1px solid var(--border);
    padding:14px 16px 12px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .titlebar{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .brand{
    font-family:var(--sans);
    font-weight:800;
    letter-spacing:0.14em;
    text-transform:uppercase;
    font-size:13px;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand .dot{color:var(--accent);}
  .counter{
    font-family:var(--mono);
    font-size:12px;
    color:var(--accent);
    background:#000;
    border:1px solid var(--accent-dim);
    border-radius:3px;
    padding:3px 7px;
    letter-spacing:0.05em;
    min-width:64px;
    text-align:center;
  }
  .search-wrap{
    position:relative;
    display:flex;
    align-items:center;
    background:#0f1113;
    border:1.5px solid var(--border);
    border-radius:10px;
    padding:0 8px 0 14px;
    transition:border-color .15s;
  }
  .search-wrap:focus-within{
    border-color:var(--accent);
  }
  .search-wrap svg{flex:0 0 auto; opacity:.55;}
  #q{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-size:17px;
    font-family:var(--sans);
    padding:13px 8px;
    min-width:0;
  }
  #q::placeholder{color:var(--text-muted);}
  #clearBtn{
    flex:0 0 auto;
    background:var(--panel-alt);
    border:none;
    color:var(--text-muted);
    width:26px; height:26px;
    border-radius:50%;
    font-size:15px;
    line-height:1;
    display:none;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  #clearBtn.show{display:flex;}

  main{
    flex:1 1 auto;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:10px 12px 24px;
  }

  .empty-state{
    margin-top:14vh;
    text-align:center;
    color:var(--text-muted);
    padding:0 24px;
  }
  .empty-state .big{
    font-size:38px;
    margin-bottom:10px;
    opacity:.5;
  }
  .empty-state .label{
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--text-muted);
  }
  .empty-state .sub{
    font-size:13px;
    margin-top:6px;
    color:#5f6569;
  }

  .card{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--panel);
    border:1px solid var(--border);
    border-left:3px solid var(--accent-dim);
    border-radius:8px;
    padding:11px 12px;
    margin-bottom:8px;
  }
  .card:active{
    background:var(--panel-alt);
    border-left-color:var(--accent);
  }
  .tag{
    flex:0 0 auto;
    font-family:var(--mono);
    font-weight:700;
    font-size:14px;
    color:#0f1113;
    background:var(--accent);
    padding:6px 8px;
    border-radius:5px;
    clip-path:polygon(6% 0,100% 0,100% 100%,0 100%,0 22%);
    letter-spacing:0.02em;
    white-space:nowrap;
  }
  .info{flex:1 1 auto; min-width:0;}
  .desc{
    font-size:14.5px;
    line-height:1.3;
    color:var(--text);
    word-break:break-word;
  }
  .desc mark{
    background:none;
    color:var(--accent);
    font-weight:700;
  }
  .unit{
    display:inline-block;
    margin-top:4px;
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:0.06em;
    color:var(--text-muted);
    border:1px solid var(--border);
    border-radius:3px;
    padding:1px 5px;
    text-transform:uppercase;
  }

  .more-note{
    text-align:center;
    color:var(--text-muted);
    font-size:12px;
    padding:12px 0 4px;
    font-family:var(--mono);
  }

  footer{
    flex:0 0 auto;
    text-align:center;
    font-size:10.5px;
    color:#4b5054;
    padding:6px 0 10px;
    letter-spacing:0.04em;
    font-family:var(--mono);
  }
</style>
</head>

</header>

  var TOTAL = ITEMS.length;

  function normalize(s){
    return s.toString()
      .toUpperCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  }

  var NORM = new Array(TOTAL);
  for (var i=0;i<TOTAL;i++){
    NORM[i] = normalize(ITEMS[i][0]) + ' ' + normalize(ITEMS[i][1]);
  }

  var qInput = document.getElementById('q');
  var results = document.getElementById('results');
  var counter = document.getElementById('counter');
  var clearBtn = document.getElementById('clearBtn');
  var MAX_RESULTS = 150;
  var debounceTimer = null;

  function escapeHtml(s){
    return s.replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; });
  }

  function highlight(text, terms){
    var out = escapeHtml(text);
    var norm = normalize(text);
    terms.forEach(function(t){
      if(!t) return;
      var idx = norm.indexOf(t);
      // simple whole-text highlight fallback: highlight matching words
    });
    return out;
  }

  function render(query){
    var raw = query.trim();
    if(!raw){
      results.innerHTML = '<div class="empty-state" id="emptyState"><div class="big">▤</div><div class="label">Digite para buscar</div><div class="sub">Busque pelo código do item ou por parte do nome</div></div>';
      counter.textContent = TOTAL + ' itens';
      return;
    }

    var normQuery = normalize(raw);
    var terms = normQuery.split(/\s+/).filter(Boolean);

    var matches = [];
    for(var i=0;i<TOTAL;i++){
      var hay = NORM[i];
      var ok = true;
      for(var t=0;t<terms.length;t++){
        if(hay.indexOf(terms[t]) === -1){ ok = false; break; }
      }
      if(ok){
        matches.push(i);
        if(matches.length >= 5000) break;
      }
    }

    counter.textContent = matches.length + ' de ' + TOTAL;

    if(matches.length === 0){
      results.innerHTML = '<div class="empty-state"><div class="big">◇</div><div class="label">Nada encontrado</div><div class="sub">Verifique o código ou tente outra palavra</div></div>';
      return;
    }

    var shown = matches.slice(0, MAX_RESULTS);
    var html = '';
    for(var k=0;k<shown.length;k++){
      var idx = shown[k];
      var item = ITEMS[idx];
      var code = escapeHtml(item[0]);
      var desc = escapeHtml(item[1]);
      var unit = escapeHtml(item[2] || '');
      html += '<div class="card">' +
                '<div class="tag">' + code + '</div>' +
                '<div class="info"><div class="desc">' + desc + '</div>' +
                (unit ? '<span class="unit">' + unit + '</span>' : '') +
                '</div>' +
              '</div>';
    }
    if(matches.length > MAX_RESULTS){
      html += '<div class="more-note">MOSTRANDO ' + MAX_RESULTS + ' DE ' + matches.length + ' RESULTADOS · REFINE A BUSCA</div>';
    }
    results.innerHTML = html;
  }

  qInput.addEventListener('input', function(){
    clearBtn.classList.toggle('show', qInput.value.length > 0);
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function(){ render(qInput.value); }, 90);
  });

  clearBtn.addEventListener('click', function(){
    qInput.value = '';
    clearBtn.classList.remove('show');
    qInput.focus();
    render('');
  });

  render('');
