<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Estoque · Busca</title>
<style>
  :root, [data-theme="dark"]{
    --bg:#14171a;
    --panel:#1c2024;
    --panel-alt:#242a2f;
    --accent:#ffc233;
    --accent-dim:#8c6a1e;
    --text:#eceef0;
    --text-muted:#8f969c;
    --border:#33393e;
    --overlay:rgba(0,0,0,0.65);
    --tag-text:#0f1113;
  }
  [data-theme="light"]{
    --bg:#eef0f1;
    --panel:#ffffff;
    --panel-alt:#e7e9eb;
    --accent:#b9790a;
    --accent-dim:#e3c791;
    --text:#1b1e21;
    --text-muted:#666e74;
    --border:#d7dade;
    --overlay:rgba(20,23,26,0.5);
    --tag-text:#14171a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; overscroll-behavior:none; transition:background .15s,color .15s;}
  body{display:flex; flex-direction:column; height:100vh; height:100dvh;}
  button{font-family:inherit;}

  header{
    flex:0 0 auto;
    background:var(--panel);
    border-bottom:1px solid var(--border);
    padding:14px 16px 12px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .titlebar{display:flex; align-items:baseline; justify-content:space-between;}
  .brand{
    font-weight:800; letter-spacing:0.14em; text-transform:uppercase; font-size:13px;
    color:var(--text); display:flex; align-items:center; gap:8px;
  }
  .brand .dot{color:var(--accent);}
  .counter{
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    font-size:12px; color:var(--accent); background:var(--panel-alt);
    border:1px solid var(--accent-dim); border-radius:3px; padding:3px 7px;
    letter-spacing:0.05em; min-width:64px; text-align:center; white-space:nowrap;
  }
  .search-row{display:flex; gap:8px; align-items:center;}
  .search-wrap{
    position:relative; flex:1 1 auto; display:flex; align-items:center;
    background:var(--bg); border:1.5px solid var(--border); border-radius:10px;
    padding:0 8px 0 14px; min-width:0; transition:border-color .15s;
  }
  .search-wrap:focus-within{border-color:var(--accent);}
  .search-wrap svg{flex:0 0 auto; opacity:.55; color:var(--text);}
  #q{
    flex:1; background:transparent; border:none; outline:none; color:var(--text);
    font-size:17px; padding:13px 8px; min-width:0;
  }
  #q::placeholder{color:var(--text-muted);}
  #clearBtn{
    flex:0 0 auto; background:var(--panel-alt); border:none; color:var(--text-muted);
    width:26px; height:26px; border-radius:50%; font-size:15px; line-height:1;
    display:none; align-items:center; justify-content:center; cursor:pointer;
  }
  #clearBtn.show{display:flex;}
  .icon-btn{
    flex:0 0 auto; width:44px; height:44px; border-radius:10px;
    background:var(--bg); border:1.5px solid var(--border); color:var(--text);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .icon-btn.active{border-color:var(--accent); color:var(--accent);}
  .icon-btn svg{width:20px; height:20px;}

  .filter-chip{
    display:none; align-items:center; gap:8px; align-self:flex-start;
    background:var(--panel-alt); border:1px solid var(--accent-dim); border-radius:20px;
    padding:6px 8px 6px 14px; font-size:12.5px; color:var(--accent); font-weight:600;
    max-width:100%;
  }
  .filter-chip.show{display:flex;}
  .filter-chip span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .filter-chip button{
    flex:0 0 auto; width:20px; height:20px; border-radius:50%; border:none;
    background:var(--accent); color:var(--tag-text); font-size:12px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  main{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:10px 12px 24px;}

  .empty-state{margin-top:14vh; text-align:center; color:var(--text-muted); padding:0 24px;}
  .empty-state .big{font-size:38px; margin-bottom:10px; opacity:.5;}
  .empty-state .label{font-weight:700; letter-spacing:0.08em; text-transform:uppercase; font-size:12px; color:var(--text-muted);}
  .empty-state .sub{font-size:13px; margin-top:6px; color:var(--text-muted); opacity:.8;}

  .card{
    display:flex; align-items:center; gap:12px; background:var(--panel);
    border:1px solid var(--border); border-left:3px solid var(--accent-dim);
    border-radius:8px; padding:11px 12px; margin-bottom:8px;
  }
  .card:active{background:var(--panel-alt); border-left-color:var(--accent);}
  .tag{
    flex:0 0 auto; font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    font-weight:700; font-size:14px; color:var(--tag-text); background:var(--accent);
    padding:6px 8px; border-radius:5px;
    clip-path:polygon(6% 0,100% 0,100% 100%,0 100%,0 22%);
    letter-spacing:0.02em; white-space:nowrap;
  }
  .info{flex:1 1 auto; min-width:0;}
  .desc{font-size:14.5px; line-height:1.3; color:var(--text); word-break:break-word;}
  .more-note{text-align:center; color:var(--text-muted); font-size:12px; padding:12px 0 4px; font-family:ui-monospace,monospace;}

  footer{
    flex:0 0 auto; text-align:center; font-size:10.5px; color:var(--text-muted);
    opacity:.7; padding:6px 0 10px; letter-spacing:0.04em;
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  }

  /* ---- painel de categorias ---- */
  .overlay{
    position:fixed; inset:0; background:var(--overlay); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .18s;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .sheet{
    background:var(--panel); width:100%; max-width:560px; max-height:82vh;
    border-radius:16px 16px 0 0; display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .22s ease-out;
    box-shadow:0 -8px 30px rgba(0,0,0,.35);
  }
  .overlay.show .sheet{transform:translateY(0);}
  .sheet-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 16px 12px; border-bottom:1px solid var(--border); flex:0 0 auto;
  }
  .sheet-header h2{
    margin:0; font-size:13px; font-weight:800; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--text);
  }
  .sheet-header button{
    background:var(--panel-alt); border:none; color:var(--text-muted);
    width:28px; height:28px; border-radius:50%; font-size:16px; cursor:pointer;
  }
  .sheet-body{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:8px 10px 20px;}

  .cat-row-all{
    display:flex; align-items:center; justify-content:space-between; width:100%;
    background:var(--panel-alt); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; margin:6px 0 12px; cursor:pointer; color:var(--text);
    font-weight:700; font-size:13.5px;
  }
  .cat-group{margin-bottom:4px;}
  .cat-top{
    display:flex; align-items:center; gap:10px; width:100%; background:transparent;
    border:none; border-radius:8px; padding:11px 8px; cursor:pointer; color:var(--text);
    text-align:left;
  }
  .cat-top:active, .cat-top.sel{background:var(--panel-alt);}
  .cat-top .chev{
    flex:0 0 auto; width:22px; height:22px; display:flex; align-items:center;
    justify-content:center; color:var(--text-muted); transition:transform .15s;
  }
  .cat-top .chev.open{transform:rotate(90deg);}
  .cat-top .name{flex:1 1 auto; font-size:14.5px; font-weight:600;}
  .cat-top.sel .name{color:var(--accent);}
  .cat-count{
    flex:0 0 auto; font-family:ui-monospace,monospace; font-size:11.5px;
    color:var(--text-muted); background:var(--bg); border:1px solid var(--border);
    border-radius:10px; padding:2px 8px;
  }
  .sub-list{display:none; padding-left:30px; margin-bottom:6px;}
  .sub-list.open{display:block;}
  .cat-sub{
    display:flex; align-items:center; justify-content:space-between; width:100%;
    background:transparent; border:none; border-left:2px solid var(--border);
    padding:9px 10px; cursor:pointer; color:var(--text-muted); font-size:13.5px;
    text-align:left; margin:2px 0;
  }
  .cat-sub:active, .cat-sub.sel{color:var(--accent); border-left-color:var(--accent);}
</style>
</head>

</div>

,["99031","CANETA ESFEROGRAFICA PT GROS PT 1UN",6,0],["99040","CANETA ESFEROGRAFICA PT FIN PT 1UN",6,0],["99058","CANETA ESFEROGRAFICA PT FIN VM 1UN",6,0],["99066","TINTA PARA ALMOFADA VERMELHA",4,3],["99074","TINTA PARA ALMOFADA PRETA",4,3],["99082","BRACADEIRA P/COL SANG 90750",7,-1],["99112","COMPRESSOR P/AR CONDICIONADO ( 10.000BTU",4,0],["99180","OTOSCOPIO",7,-1],["99198","RISPERIDONA 3MG CP REV",0,0],["99244","CURATIVO BIOLOGICO (ALLEVYN HIDROCELULAR",1,4],["99252","CURATIVO INTRASITE GEL",1,4],["99260","PARAFUSO P/CAIXA DE DESCARGA",3,0],["99287","CUBA INOX QUADRADA",4,3],["99295","SISTEMA ASP 8FRX30.5CM TRACH CARE 198",7,-1],["99368","ROLAMENTO RIG ESF 608-ZZ",7,-1],["99376","PRESSOSTATO  80-120 P/COMPRESSOR DE AR",4,0],["99384","BROCA MAD CH A1010/20 3/4 150MM",4,0],["99457","SUPORTE P/ PERFURO CORTANTE 13L",4,7],["99465","CONECTOR BOX RETO-CURVO 1\"",4,2],["99473","CONECTOR BOX RETO-CURVO 3/4\"",4,2],["99481","LIXA FOLHA 120 ALO 225X275MM",4,0],["99511","BROCA CONC SDS PLUS 4MM ISO 5468",4,0],["99520","BUCHA FIXACAO PARAF PA S4 4X20MM",4,2],["99546","CAPACETE ACRILICO REUT PEQUENO 15X17CM",4,5],["99554","CAPACETE ACRILICO REUT GRANDE 25X18CM",4,5],["99562","CAPACETE ACRILICO REUT MEDIO 20X21CM",4,5],["99759","CAIXA PASSAG EMB ALV NT QD 20X20CM",4,1],["99791","PIPETA AUTOMATICA 25 UL",2,2],["99813","PIPETA AUTO 1 CANAL 10µL",2,2],["99848","MICONAZOL 2% BISN 80G",0,4],["99864","PEDRISCO",7,-1],["99872","BUJAO CAB QUAD PVC BR BSP1.1/2",4,2],["99899","BUJAO QD FM6590 BSP 3/4 150#",4,2],["99902","CONJUNTO PARA SOLDA OXIGENIO COMPLETO",7,-1],["99937","ABRACADEIRA D M AI304 1.1/4\"",4,0],["99953","BOTAO FACEADO VM 1NA SPRN1",7,-1],["99961","BOTOEIRA LIGA E DESLIGA",7,-1]]};
  var CATS = DATA.cats;      // [{label, subs:[label,...]}, ...]
  var ITEMS = DATA.items;    // [codigo, descricao, topIdx, subIdx]
  var TOTAL = ITEMS.length;

  function normalize(s){
    return s.toString().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  }

  var NORM = new Array(TOTAL);
  for (var i=0;i<TOTAL;i++){ NORM[i] = normalize(ITEMS[i][0]) + ' ' + normalize(ITEMS[i][1]); }

  // contagem por categoria/subcategoria
  var topCounts = new Array(CATS.length).fill(0);
  var subCounts = CATS.map(function(c){ return new Array(c.subs.length).fill(0); });
  for (var i=0;i<TOTAL;i++){
    var t = ITEMS[i][2], s = ITEMS[i][3];
    if(t>=0){ topCounts[t]++; if(s>=0) subCounts[t][s]++; }
  }

  var qInput = document.getElementById('q');
  var results = document.getElementById('results');
  var counter = document.getElementById('counter');
  var clearBtn = document.getElementById('clearBtn');
  var MAX_RESULTS = 150;
  var debounceTimer = null;
  var activeFilter = null; // {top, sub} sub can be -1 for "toda a categoria"

  function escapeHtml(s){ return s.replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }

  function emptyStateHtml(){
    return '<div class="empty-state"><div class="big">▤</div><div class="label">Digite para buscar</div>'+
           '<div class="sub">Busque pelo código, nome, ou toque no ícone de categorias</div></div>';
  }

  function matchesFilter(idx){
    if(!activeFilter) return true;
    if(ITEMS[idx][2] !== activeFilter.top) return false;
    if(activeFilter.sub >= 0 && ITEMS[idx][3] !== activeFilter.sub) return false;
    return true;
  }

  function render(query){
    var raw = (query||'').trim();
    var normQuery = normalize(raw);
    var terms = normQuery.split(/\s+/).filter(Boolean);

    if(!raw && !activeFilter){
      results.innerHTML = emptyStateHtml();
      counter.textContent = TOTAL + ' itens';
      return;
    }

    var matches = [];
    for(var i=0;i<TOTAL;i++){
      if(!matchesFilter(i)) continue;
      if(terms.length){
        var hay = NORM[i], ok = true;
        for(var t=0;t<terms.length;t++){ if(hay.indexOf(terms[t]) === -1){ ok=false; break; } }
        if(!ok) continue;
      }
      matches.push(i);
      if(matches.length >= 6000) break;
    }

    counter.textContent = matches.length + (raw ? ' de '+TOTAL : ' nesta categoria');

    if(matches.length === 0){
      results.innerHTML = '<div class="empty-state"><div class="big">◇</div><div class="label">Nada encontrado</div><div class="sub">Verifique o código, o termo, ou troque a categoria</div></div>';
      return;
    }

    var shown = matches.slice(0, MAX_RESULTS);
    var html = '';
    for(var k=0;k<shown.length;k++){
      var item = ITEMS[shown[k]];
      html += '<div class="card"><div class="tag">'+escapeHtml(item[0])+'</div>'+
              '<div class="info"><div class="desc">'+escapeHtml(item[1])+'</div></div></div>';
    }
    if(matches.length > MAX_RESULTS){
      html += '<div class="more-note">MOSTRANDO '+MAX_RESULTS+' DE '+matches.length+' RESULTADOS · REFINE A BUSCA</div>';
    }
    results.innerHTML = html;
  }

  qInput.addEventListener('input', function(){
    clearBtn.classList.toggle('show', qInput.value.length > 0);
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function(){ render(qInput.value); }, 90);
  });
  clearBtn.addEventListener('click', function(){
    qInput.value=''; clearBtn.classList.remove('show'); qInput.focus(); render('');
  });

  // ---- painel de categorias ----
  var catOverlay = document.getElementById('catOverlay');
  var catBody = document.getElementById('catBody');
  var filterChip = document.getElementById('filterChip');
  var filterChipLabel = document.getElementById('filterChipLabel');

  function buildCatPanel(){
    var html = '<div class="cat-row-all" id="catAll"><span>TODOS OS ITENS</span><span class="cat-count">'+TOTAL+'</span></div>';
    for(var t=0;t<CATS.length;t++){
      var c = CATS[t];
      html += '<div class="cat-group">'+
                '<button class="cat-top" data-top="'+t+'">'+
                  '<span class="chev" data-chev="'+t+'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 6 15 12 9 18"/></svg></span>'+
                  '<span class="name">'+escapeHtml(c.label)+'</span>'+
                  '<span class="cat-count">'+topCounts[t]+'</span>'+
                '</button>'+
                '<div class="sub-list" id="subs-'+t+'">';
      for(var s=0;s<c.subs.length;s++){
        html += '<button class="cat-sub" data-top="'+t+'" data-sub="'+s+'">'+
                  '<span>'+escapeHtml(c.subs[s])+'</span>'+
                  '<span class="cat-count">'+subCounts[t][s]+'</span>'+
                '</button>';
      }
      html += '</div></div>';
    }
    catBody.innerHTML = html;

    document.getElementById('catAll').addEventListener('click', function(){
      activeFilter = null; updateChip(); closeCatPanel(); render(qInput.value);
    });

    var tops = catBody.querySelectorAll('.cat-top');
    for(var a=0;a<tops.length;a++){
      // toque na linha (fora da seta) = seleciona a categoria inteira
      tops[a].addEventListener('click', function(){
        var t = parseInt(this.getAttribute('data-top'),10);
        activeFilter = {top:t, sub:-1};
        updateChip(); closeCatPanel(); render(qInput.value);
      });
      // toque na seta = so expande/recolhe as subcategorias, nao seleciona
      var chevEl = tops[a].querySelector('.chev');
      chevEl.addEventListener('click', function(e){
        e.stopPropagation();
        var t = parseInt(this.getAttribute('data-chev'),10);
        var subEl = document.getElementById('subs-'+t);
        var isOpen = subEl.classList.contains('open');
        var allSubs = catBody.querySelectorAll('.sub-list');
        for(var z=0;z<allSubs.length;z++){ allSubs[z].classList.remove('open'); }
        var allChev = catBody.querySelectorAll('.chev');
        for(var z2=0;z2<allChev.length;z2++){ allChev[z2].classList.remove('open'); }
        if(!isOpen){
          subEl.classList.add('open');
          this.classList.add('open');
        }
      });
    }
    var subs = catBody.querySelectorAll('.cat-sub');
    for(var b=0;b<subs.length;b++){
      subs[b].addEventListener('click', function(){
        var t = parseInt(this.getAttribute('data-top'),10);
        var s = parseInt(this.getAttribute('data-sub'),10);
        activeFilter = {top:t, sub:s};
        updateChip(); closeCatPanel(); render(qInput.value);
      });
    }
  }

  function updateChip(){
    if(!activeFilter){ filterChip.classList.remove('show'); return; }
    var c = CATS[activeFilter.top];
    var label = c.label + (activeFilter.sub>=0 ? ' › ' + c.subs[activeFilter.sub] : '');
    filterChipLabel.textContent = label;
    filterChip.classList.add('show');
    // marca selecionado visualmente
    var tops = catBody.querySelectorAll('.cat-top');
    for(var i=0;i<tops.length;i++){ tops[i].classList.toggle('sel', parseInt(tops[i].getAttribute('data-top'),10)===activeFilter.top && activeFilter.sub<0); }
    var subs = catBody.querySelectorAll('.cat-sub');
    for(var j=0;j<subs.length;j++){
      var st = parseInt(subs[j].getAttribute('data-top'),10), ss = parseInt(subs[j].getAttribute('data-sub'),10);
      subs[j].classList.toggle('sel', st===activeFilter.top && ss===activeFilter.sub);
    }
  }

  document.getElementById('filterChipClear').addEventListener('click', function(){
    activeFilter = null; updateChip(); render(qInput.value);
  });

  function openCatPanel(){ catOverlay.classList.add('show'); }
  function closeCatPanel(){ catOverlay.classList.remove('show'); }

  document.getElementById('catBtn').addEventListener('click', openCatPanel);
  document.getElementById('catClose').addEventListener('click', closeCatPanel);
  catOverlay.addEventListener('click', function(e){ if(e.target===catOverlay) closeCatPanel(); });

  buildCatPanel();

  // ---- tema claro/escuro ----
  var SUN = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
  var MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  var themeIcon = document.getElementById('themeIcon');
  var themeBtn = document.getElementById('themeBtn');
  function setTheme(mode){
    document.documentElement.setAttribute('data-theme', mode);
    themeIcon.innerHTML = mode==='dark' ? SUN : MOON;
  }
  var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  setTheme(prefersLight ? 'light' : 'dark');
  themeBtn.addEventListener('click', function(){
    var cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur==='dark' ? 'light' : 'dark');
  });

  render('');
</script>
